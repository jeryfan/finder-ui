# Vercel Demo Deployment & Release
#
# 触发条件: 推送版本标签 (如 v1.0.0)
# 功能:
#   1. 创建 GitHub Release
#   2. Vercel 会自动部署（在 Vercel Dashboard 中配置）

name: Release

on:
  push:
    tags:
      - 'v*'

env:
  NODE_VERSION: '20'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Build library
        run: npm run build

      - name: Pack dist
        run: |
          cd dist
          zip -r ../dist.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          files: dist.zip
          body: |
            ## Demo
            在线示例: https://finder-ui.vercel.app

            ## Installation
            ```bash
            npm install @jeryfan/finder-ui
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
